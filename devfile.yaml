schemaVersion: 2.2.0
metadata:
  name: AI-MaaS-Workshop
components:
  - name: python-env
    container:
      image: registry.access.redhat.com/ubi9/python-311:latest
      memoryLimit: 2G
      env:
        - name: OPENAI_API_BASE
          value: "http://granite-model.ai-namespace.svc.cluster.local:8080/v1"
        - name: OPENAI_API_KEY
          value: "workshop-key"
      command: ['tail', '-f', '/dev/null']